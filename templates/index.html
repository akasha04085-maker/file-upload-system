<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 File Upload Manager</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- Space Background -->
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <!-- Shooting Stars -->
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>

    <div class="container">

        <h1>📁 File Upload Manager</h1>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="message-box">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Upload Form -->
        <form action="/upload"
              method="POST"
              enctype="multipart/form-data">

            <label for="file-upload" class="choose-btn">
                📁 Choose File
            </label>

            <input
                type="file"
                id="file-upload"
                name="file"
                required>

            <button
                type="submit"
                class="upload-btn">
                🚀 Upload
            </button>

        </form>

        <h2>📂 Uploaded Files</h2>

        {% if files %}

            {% for file in files %}

            <div class="file-card">

                <div class="file-name">
                    📄 {{ file }}
                </div>

                <div class="actions">

                    <a href="/download/{{ file }}">
                        <button
                            type="button"
                            class="download-btn">
                            ⬇ Download
                        </button>
                    </a>

                    <a href="/delete/{{ file }}">
                        <button
                            type="button"
                            class="delete-btn">
                            🗑 Delete
                        </button>
                    </a>

                </div>

            </div>

            {% endfor %}

        {% else %}

            <div class="empty-card">
                No files uploaded yet.
            </div>

        {% endif %}

    </div>

    <script>

        const fileInput =
            document.getElementById("file-upload");

        const chooseButton =
            document.querySelector(".choose-btn");

        fileInput.addEventListener("change", () => {

            if(fileInput.files.length > 0){

                chooseButton.textContent =
                    "📄 " +
                    fileInput.files[0].name;
            }

        });

    </script>

</body>

</html>
